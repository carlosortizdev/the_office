<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pixel Tab Art</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 200px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #141420;
      color: #ddddf0;
      padding: 16px;
      user-select: none;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #b8b8ff;
      margin-bottom: 3px;
    }

    #hostname {
      font-size: 11px;
      color: #666688;
      margin-bottom: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #preview-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
    }

    #preview {
      image-rendering: pixelated;
      border-radius: 4px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.55);
    }

    #critter-label {
      text-align: center;
      font-size: 11px;
      color: #555577;
      margin-bottom: 14px;
      text-transform: capitalize;
      letter-spacing: 0.05em;
    }

    #btn-toggle {
      width: 100%;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: #2a2a48;
      color: #9090c8;
      border: 1px solid #36365a;
      transition: opacity 0.15s, transform 0.1s;
    }

    #btn-toggle:active { transform: scale(0.96); }
    #btn-toggle:hover  { opacity: 0.82; }

    #btn-toggle.enabled {
      background: #1e1e36;
      color: #5555aa;
    }
  </style>
</head>
<body>
  <h1>Pixel Tab Art</h1>
  <div id="hostname">loading…</div>

  <div id="preview-wrap">
    <canvas id="preview"></canvas>
  </div>
  <div id="critter-label"></div>

  <button id="btn-toggle">Enable</button>

  <script src="utils/pixelart.js"></script>
  <script src="popup.js"></script>
</body>
</html>
